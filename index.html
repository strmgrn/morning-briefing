<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Morning Briefing — Christoffer Strömgren</title>
<script src="https://accounts.google.com/gsi/client" async defer></script>
<style>
  :root {
    --bg: #0f1117; --bg2: #181c27; --bg3: #1e2333; --border: #2a2f42;
    --text: #e8eaf0; --text2: #8b90a4; --text3: #555b70;
    --accent: #4f7ef8; --green: #34c97a; --red: #f05252; --orange: #f5a623;
    --red-bg: #2a1a1a; --red-border: #4a2020; --green-bg: #0d2018; --blue-bg: #0d1a30;
    --radius: 12px; --radius-sm: 8px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; padding: 24px 20px 48px; }
  a { color: inherit; text-decoration: none; }
  a:hover { opacity: 0.8; }

  .header { display: flex; align-items: baseline; gap: 12px; margin-bottom: 20px; }
  .header h1 { font-size: 22px; font-weight: 600; }
  .header .date { font-size: 13px; color: var(--text2); }
  .header .meta { margin-left: auto; font-size: 11px; color: var(--text3); }
  .header .refresh { font-size: 12px; cursor: pointer; padding: 4px 10px; border: 1px solid var(--border); border-radius: 6px; background: none; color: var(--text2); }
  .header .refresh:hover { background: var(--bg3); }

  #error-state { display: none; background: var(--red-bg); border: 1px solid var(--red-border); border-radius: var(--radius); padding: 16px; margin-bottom: 16px; font-size: 13px; color: var(--red); }
  #stale-banner { display: none; background: #2a1e0d; border: 1px solid #4a3010; border-radius: var(--radius); padding: 10px 16px; margin-bottom: 12px; font-size: 12px; color: var(--orange); }

  .action-card { background: var(--red-bg); border: 1px solid var(--red-border); border-radius: var(--radius); padding: 14px 16px; margin-bottom: 12px; }
  .section-label { font-size: 10px; font-weight: 600; letter-spacing: .08em; text-transform: uppercase; margin-bottom: 10px; }
  .action-card .section-label { color: var(--red); }
  .action-item { display: flex; align-items: flex-start; gap: 10px; padding: 7px 0; border-bottom: 1px solid var(--red-border); }
  .action-item:last-child { border-bottom: none; padding-bottom: 0; }
  .action-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--red); flex-shrink: 0; margin-top: 5px; }
  .action-text { font-size: 13px; line-height: 1.45; }
  .action-meta { font-size: 11px; color: var(--text2); margin-top: 2px; }
  .no-actions { font-size: 13px; color: var(--green); }

  .grid3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 10px; }
  .grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  @media (max-width: 900px) { .grid3 { grid-template-columns: 1fr 1fr; } }
  @media (max-width: 600px) { .grid3, .grid2 { grid-template-columns: 1fr; } }

  .card { background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius); padding: 14px 16px; }
  .card-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
  .card-header .section-label { color: var(--text2); margin-bottom: 0; }
  .badge { font-size: 10px; font-weight: 600; padding: 2px 8px; border-radius: 99px; white-space: nowrap; }
  .badge-red { background: var(--red-bg); color: var(--red); border: 1px solid var(--red-border); }
  .badge-orange { background: #2a1e0d; color: var(--orange); border: 1px solid #4a3010; }
  .badge-green { background: var(--green-bg); color: var(--green); border: 1px solid #1a4030; }
  .badge-blue { background: var(--blue-bg); color: var(--accent); border: 1px solid #1a2a50; }
  .badge-gray { background: var(--bg3); color: var(--text2); border: 1px solid var(--border); }

  .row { display: flex; justify-content: space-between; align-items: flex-start; padding: 6px 0; border-bottom: 1px solid var(--border); gap: 8px; cursor: pointer; border-radius: 4px; transition: background .12s; }
  .row:last-child { border-bottom: none; padding-bottom: 0; }
  .row:hover { background: var(--bg3); margin: 0 -4px; padding-left: 4px; padding-right: 4px; }
  .row-label { font-size: 13px; line-height: 1.4; flex: 1; }
  .row-label.bold { font-weight: 500; }
  .row-meta { font-size: 11px; color: var(--text2); white-space: nowrap; }
  .row-meta.danger { color: var(--red); }
  .empty-row { font-size: 13px; color: var(--text3); padding: 4px 0; }

  .cal-item { display: flex; align-items: flex-start; gap: 10px; padding: 5px 4px; border-bottom: 1px solid var(--border); border-radius: 4px; transition: background .12s; cursor: pointer; }
  .cal-item:last-child { border-bottom: none; }
  .cal-item:hover { background: var(--bg3); }
  .cal-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; margin-top: 4px; }
  .dot-ncc { background: #4f7ef8; }
  .dot-priv { background: #34c97a; }
  .cal-name { font-size: 13px; line-height: 1.4; }
  .cal-name.cancelled { text-decoration: line-through; color: var(--text2); }
  .cal-time { font-size: 11px; color: var(--text2); margin-top: 1px; }
  .teams-badge { font-size: 10px; padding: 1px 5px; border-radius: 4px; background: #1a2a50; color: var(--accent); margin-left: 6px; vertical-align: middle; }
  .legend { display: flex; gap: 14px; margin-bottom: 10px; }
  .legend-item { display: flex; align-items: center; gap: 5px; font-size: 11px; color: var(--text2); }

  .metrics { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-bottom: 12px; }
  .metric { background: var(--bg3); border-radius: var(--radius-sm); padding: 10px 12px; }
  .metric-label { font-size: 11px; color: var(--text2); margin-bottom: 4px; }
  .metric-value { font-size: 22px; font-weight: 600; }
  .metric-value.green { color: var(--green); }
  .metric-value.red { color: var(--red); }
  .metric-value.orange { color: var(--orange); }

  .sla-bar-bg { height: 5px; background: var(--bg3); border-radius: 99px; margin-top: 6px; }
  .sla-bar-fill { height: 5px; border-radius: 99px; background: var(--green); }
  .sla-bar-fill.warn { background: var(--orange); }
  .sla-bar-fill.danger { background: var(--red); }

  .tt-section-label { font-size: 10px; font-weight: 600; letter-spacing: .07em; text-transform: uppercase; margin: 10px 0 4px; }
  .tt-section-label.overdue { color: var(--red); }
  .tt-section-label.today { color: var(--text); margin-top: 12px; }
  .tt-section-label.inbox { color: var(--text2); margin-top: 12px; }
  .tt-item { display: flex; align-items: flex-start; gap: 9px; padding: 5px 4px; border-bottom: 1px solid var(--border); cursor: pointer; border-radius: 4px; transition: background .12s; }
  .tt-item:last-child { border-bottom: none; }
  .tt-item:hover { background: var(--bg3); }
  .tt-circle { width: 14px; height: 14px; border-radius: 50%; border: 1.5px solid var(--border); flex-shrink: 0; margin-top: 2px; }
  .tt-circle.overdue { border-color: var(--red); }
  .tt-text { font-size: 13px; line-height: 1.4; }
  .tt-meta { font-size: 11px; color: var(--text2); margin-top: 1px; }
  .tt-meta.danger { color: var(--red); }

  .wk-day { margin-bottom: 4px; }
  .wk-header { display: flex; align-items: center; gap: 8px; margin-bottom: 3px; padding: 0 2px; }
  .wk-date-label { font-size: 11px; font-weight: 600; color: var(--text2); min-width: 82px; }
  .wk-date-label.today { color: var(--accent); }
  .wk-events-col { padding-left: 90px; }
  .wk-event { font-size: 12px; line-height: 1.4; padding: 3px 4px; border-bottom: 1px solid var(--border); color: var(--text); cursor: pointer; border-radius: 4px; transition: background .12s; }
  .wk-event:last-child { border-bottom: none; }
  .wk-event:hover { background: var(--bg3); }
  .wk-event-time { font-size: 11px; color: var(--text2); margin-right: 5px; }
  .wk-empty { font-size: 12px; color: var(--text3); padding: 2px 0 4px 90px; }
  .wk-divider { border: none; border-top: 1px solid var(--border); margin: 5px 0; }

  .right-col { display: flex; flex-direction: column; gap: 10px; }

  #auth-overlay { position: fixed; inset: 0; z-index: 9999; background: var(--bg); display: flex; align-items: center; justify-content: center; }
  #auth-box { background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius); padding: 40px 48px; text-align: center; max-width: 360px; width: 90%; }
  #auth-box h2 { font-size: 18px; font-weight: 600; margin-bottom: 6px; }
  #auth-box p { font-size: 13px; color: var(--text2); margin-bottom: 28px; }
  #auth-denied { display: none; }
  #auth-denied p { color: var(--red); margin-bottom: 16px; }
  #auth-denied button { font-size: 12px; color: var(--text2); background: none; border: 1px solid var(--border); border-radius: 6px; padding: 6px 14px; cursor: pointer; }
  #auth-denied button:hover { background: var(--bg3); }
  #main-content { display: none; }
  #loading-state { display: flex; align-items: center; justify-content: center; min-height: 200px; font-size: 13px; color: var(--text3); }
</style>
</head>
<body>

<div id="auth-overlay">
  <div id="auth-box">
    <div id="auth-signin">
      <h2>Morning Briefing</h2>
      <p>Sign in with your Google account to continue.</p>
      <div id="g_id_onload"
        data-client_id="80684860571-jg8h11uhd9hd9n1gik0dres3kcnopger.apps.googleusercontent.com"
        data-callback="handleCredentialResponse"
        data-auto_select="true"
        data-itp_support="true">
      </div>
      <div class="g_id_signin"
        data-type="standard" data-shape="rectangular" data-theme="filled_black"
        data-text="sign_in_with" data-size="large" data-logo_alignment="left">
      </div>
    </div>
    <div id="auth-denied">
      <h2>Access denied</h2>
      <p>This account is not authorised to view this dashboard.</p>
      <button onclick="signOut()">Try a different account</button>
    </div>
  </div>
</div>

<div id="main-content">
  <div id="stale-banner">Data is from a previous session — say "god morgon" to Claude to refresh.</div>
  <div id="error-state">Could not load briefing data. Try refreshing.</div>
  <div class="header">
    <h1>Morning Briefing</h1>
    <span class="date" id="hdr-date"></span>
    <span class="meta" id="hdr-generated"></span>
    <button class="refresh" onclick="loadData()">↻ Refresh</button>
  </div>
  <div id="dashboard-body"><div id="loading-state">Loading briefing data…</div></div>
</div>

<script>
const ALLOWED_EMAIL = 'christoffer.stromgren@gmail.com';
const SESSION_KEY = 'mb_authed';
const GIST_ID = 'c8456a17e1a496f4d245f0aa07c12901';
const GIST_RAW = `https://gist.githubusercontent.com/strmgrn/${GIST_ID}/raw/briefing.json`;

function handleCredentialResponse(response) {
  const payload = JSON.parse(atob(response.credential.split('.')[1]));
  if (payload.email === ALLOWED_EMAIL) {
    sessionStorage.setItem(SESSION_KEY, '1');
    showDashboard();
  } else {
    document.getElementById('auth-signin').style.display = 'none';
    document.getElementById('auth-denied').style.display = 'block';
  }
}
function showDashboard() {
  document.getElementById('auth-overlay').style.display = 'none';
  document.getElementById('main-content').style.display = 'block';
  loadData();
}
function signOut() {
  sessionStorage.removeItem(SESSION_KEY);
  document.getElementById('auth-denied').style.display = 'none';
  document.getElementById('auth-signin').style.display = 'block';
  google.accounts.id.disableAutoSelect();
}
if (sessionStorage.getItem(SESSION_KEY)) showDashboard();

async function loadData() {
  document.getElementById('dashboard-body').innerHTML = '<div id="loading-state">Loading briefing data…</div>';
  document.getElementById('error-state').style.display = 'none';
  document.getElementById('stale-banner').style.display = 'none';
  try {
    const res = await fetch(GIST_RAW + '?t=' + Date.now());
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const d = await res.json();
    renderDashboard(d);
  } catch(e) {
    document.getElementById('dashboard-body').innerHTML = '';
    document.getElementById('error-state').style.display = 'block';
  }
}

function renderDashboard(d) {
  const now = new Date();
  document.getElementById('hdr-date').textContent = now.toLocaleDateString('en-SE', {weekday:'long', day:'numeric', month:'long', year:'numeric'});
  if (d.generated && d.generated !== 'never') {
    const gen = new Date(d.generated);
    document.getElementById('hdr-generated').textContent = 'Updated ' + gen.toLocaleTimeString('sv-SE', {hour:'2-digit', minute:'2-digit'});
    if ((now - gen) / 36e5 > 20) document.getElementById('stale-banner').style.display = 'block';
  } else {
    document.getElementById('hdr-generated').textContent = 'No data yet — say "god morgon" to Claude';
  }

  let h = '';

  // ACTIONS
  const actions = d.actions || [];
  h += `<div class="action-card"><div class="section-label">Action required</div>`;
  if (!actions.length) h += `<div class="no-actions">No actions required — clear!</div>`;
  actions.forEach(a => h += `<div class="action-item"><div class="action-dot"></div><div><a href="${a.url||'#'}" target="_blank"><div class="action-text">${x(a.text)}</div><div class="action-meta">${x(a.meta)}</div></a></div></div>`);
  h += `</div>`;

  // EMAILS
  const em = d.emails || {};
  h += `<div class="grid3" style="margin-bottom:10px">`;
  h += emailCard('Gmail personal', em.gmail||[], 'https://mail.google.com/mail/u/0/#inbox');
  h += emailCard('Power Branch', em.powerbranch||[], 'https://mail.google.com/mail/u/1/#inbox');
  h += emailCard('NCC Outlook', em.ncc||[], 'https://outlook.cloud.microsoft/mail/inbox');
  h += `</div>`;

  // 2-COL
  h += `<div class="grid2">`;

  // CALENDAR
  const cal = d.calendar || [];
  h += `<div class="card"><div class="card-header"><span class="section-label">NCC Calendar — today</span><span class="badge badge-blue">${cal.length} event${cal.length!==1?'s':''}</span></div>
  <div class="legend"><div class="legend-item"><div class="cal-dot dot-ncc"></div>NCC</div><div class="legend-item"><div class="cal-dot dot-priv"></div>Personal</div></div>`;
  if (!cal.length) h += `<div class="empty-row">No events today</div>`;
  cal.forEach(e => h += `<a href="${e.url||'https://outlook.cloud.microsoft/calendar/view/day'}" target="_blank"><div class="cal-item"><div class="cal-dot ${e.type==='personal'?'dot-priv':'dot-ncc'}"></div><div><div class="cal-name${e.cancelled?' cancelled':''}">${x(e.title)}${e.teams?'<span class="teams-badge">Teams</span>':''}</div><div class="cal-time">${x(e.time)}${e.organiser?' · '+x(e.organiser):''}</div></div></div></a>`);
  h += `</div>`;

  // RIGHT COL
  h += `<div class="right-col">`;

  // SERVICENOW
  const sn = d.servicenow || {};
  const hi = sn.high||0, es = sn.escalated||0, sl = sn.sla_critical||0;
  const osla = sn.open_sla||[], impq = sn.improvement_queue||[];
  h += `<div class="card"><div class="card-header"><span class="section-label">ServiceNow</span>
    <a href="https://nccprod.service-now.com/now/nav/ui/classic/params/target/%24pa_dashboard.do%3Fsysparm_dashboard%3D9cb3250ddba870502b985ca5f396193b" target="_blank" style="font-size:11px;color:var(--accent)">Open dashboard ↗</a></div>
    <div class="metrics">
      <div class="metric"><div class="metric-label">High priority</div><div class="metric-value ${hi>0?'red':'green'}">${hi}</div></div>
      <div class="metric"><div class="metric-label">Escalated</div><div class="metric-value ${es>0?'red':'green'}">${es}</div></div>
      <div class="metric"><div class="metric-label">SLA &lt;6h</div><div class="metric-value ${sl>0?'orange':'green'}">${sl}</div></div>
    </div>
    <div class="card-header" style="margin-bottom:6px"><span class="section-label" style="margin-bottom:0">Open SLA</span>
    <span class="badge ${osla.length?'badge-orange':'badge-green'}">${osla.length?osla.length+' ticket'+(osla.length>1?'s':''):'Clear'}</span></div>`;
  if (!osla.length) h += `<div class="empty-row">No open SLA tickets</div>`;
  osla.forEach(t => {
    const p = t.elapsed_pct||0, fc = p>80?'danger':p>50?'warn':'';
    h += `<a href="${t.url||'#'}" target="_blank"><div class="row" style="flex-direction:column;gap:4px">
      <span style="font-size:12px;font-weight:600;color:var(--accent)">${x(t.number)}</span>
      <span class="row-label">${x(t.title)}</span>
      <span style="font-size:11px;color:var(--text2)">${x(t.state)} · ${x(t.assignee)}</span>
      <div class="sla-bar-bg"><div class="sla-bar-fill ${fc}" style="width:${p}%"></div></div>
      <span style="font-size:11px;color:var(--text2)">${p}% elapsed · ${x(t.time_left)} left</span>
    </div></a>`;
  });
  h += `<div class="card-header" style="margin-top:12px;margin-bottom:4px"><span class="section-label" style="margin-bottom:0">Improvement queue</span>
    <span class="badge ${impq.length?'badge-orange':'badge-green'}">${impq.length?impq.length+' new':'Clear'}</span></div>`;
  if (!impq.length) h += `<div class="empty-row">No new improvement suggestions.</div>`;
  impq.forEach(t => h += `<a href="${t.url||'#'}" target="_blank"><div class="row"><span class="row-label">${x(t.title)}</span><span class="row-meta">${x(t.meta)}</span></div></a>`);
  h += `</div>`;

  // TICKTICK
  const tt = d.ticktick||{}, ov=tt.overdue||[], td=tt.today||[], ib=tt.inbox||[];
  h += `<div class="card"><div class="card-header"><span class="section-label">TickTick</span>
    <span class="badge ${ov.length?'badge-red':'badge-gray'}">${ov.length} overdue · ${td.length} today · ${ib.length} inbox</span></div>`;
  if (ov.length) { h += `<div class="tt-section-label overdue">Overdue</div>`; ov.forEach(t => h += `<a href="https://ticktick.com/webapp/#q/today/tasks" target="_blank"><div class="tt-item"><div class="tt-circle overdue"></div><div><div class="tt-text">${x(t.text)}</div><div class="tt-meta danger">${x(t.due)}</div></div></div></a>`); }
  if (td.length) { h += `<div class="tt-section-label today">Today</div>`; td.forEach(t => h += `<a href="https://ticktick.com/webapp/#q/today/tasks" target="_blank"><div class="tt-item"><div class="tt-circle"></div><div><div class="tt-text">${x(t.text)}</div><div class="tt-meta">${x(t.meta||'')}</div></div></div></a>`); }
  if (ib.length) { h += `<div class="tt-section-label inbox">Top inbox (ncc)</div>`; ib.forEach(t => h += `<a href="https://ticktick.com/webapp/#p/inbox/tasks" target="_blank"><div class="tt-item"><div class="tt-circle"></div><div class="tt-text">${x(t.text)}</div></div></a>`); }
  if (!ov.length && !td.length && !ib.length) h += `<div class="empty-row">No tasks</div>`;
  h += `</div>`;

  // PERSONAL CAL 7-DAY
  const pc = d.personal_cal||[];
  h += `<div class="card"><div class="card-header"><span class="section-label">Personal calendar — 7 days</span>
    <a href="https://calendar.google.com/calendar/u/0/r/week" target="_blank" style="font-size:11px;color:var(--accent)">Open ↗</a></div>`;
  if (!pc.length) h += `<div class="empty-row">No events this week</div>`;
  pc.forEach((day, i) => {
    if (i>0) h += `<hr class="wk-divider">`;
    h += `<div class="wk-day"><div class="wk-header"><span class="wk-date-label${day.today?' today':''}">${x(day.label)}</span></div>`;
    if (!day.events||!day.events.length) { h += `<div class="wk-empty">Nothing scheduled</div>`; }
    else { h += `<div class="wk-events-col">`; day.events.forEach(e => h += `<a href="${e.url||'https://calendar.google.com/calendar/u/0/r/week'}" target="_blank"><div class="wk-event"><span class="wk-event-time">${x(e.time)}</span>${x(e.title)}</div></a>`); h += `</div>`; }
    h += `</div>`;
  });
  h += `</div>`;

  h += `</div></div>`; // right-col, grid2
  h += `<div style="text-align:center;margin-top:32px;font-size:11px;color:var(--text3)">Morning Briefing · <a href="https://claude.ai" target="_blank" style="color:var(--text3)">claude.ai</a></div>`;
  document.getElementById('dashboard-body').innerHTML = h;
}

function emailCard(title, items, fallbackUrl) {
  const hasBad = items.some(m => m.urgent);
  let h = `<div class="card"><div class="card-header"><span class="section-label">${title}</span>
    <span class="badge ${items.length?(hasBad?'badge-red':'badge-orange'):'badge-green'}">${items.length?items.length+' item'+(items.length>1?'s':''):'Clear'}</span></div>`;
  if (!items.length) h += `<div class="empty-row">No actionable emails</div>`;
  items.forEach(m => h += `<a href="${m.url||fallbackUrl}" target="_blank"><div class="row"><span class="row-label${m.bold?' bold':''}">${x(m.subject)}</span><span class="row-meta${m.urgent?' danger':''}">${x(m.meta)}</span></div></a>`);
  return h + `</div>`;
}

function x(s) {
  if (!s) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
</script>
</body>
</html>
